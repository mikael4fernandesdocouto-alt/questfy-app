version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: questfy-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: questfy
      POSTGRES_PASSWORD: questfy_secret
      POSTGRES_DB: questfy_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questfy"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: questfy-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://questfy:questfy_secret@postgres:5432/questfy_db?schema=public"
      JWT_SECRET: "questfy-jwt-secret-change-in-production"
      JWT_EXPIRES_IN: "7d"
      PORT: 3001
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules

volumes:
  pgdata:
